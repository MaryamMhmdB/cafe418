<!DOCTYPE html>
<html lang="en" class="mb">
<head>
<meta charset="UTF-8">
<title>Cart</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="navbar">

    <div class="nav-left">
        <img src="./images/theLogo.png" class="logo">

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="about.html">About us</a>
            <a href="contact-us.html">Contact us</a>
        </div>
    </div>

    <div class="nav-icons">
        <img src="./images/icons/search.png" class="icon-img">
        <img src="./images/icons/cart.png" class="icon-img" onclick="window.location.href='cart.html'">
          <a href="profile.html"><img src="./images/icons/profile.png" class="icon-img"></a>
    </div>

</div>


<div class="cart-section">

    <h3 style="color:#63451a;">🛒 Your Cart</h3>

    <div class="cart-item">
        <span>Caramel Latte (Medium, Hot) x1</span>

        <div class="actions">
            <span>18 SAR</span>
            <button class="edit-btn"><a href="Product_details.html">✏️</a></button>
            <button class="delete-btn">🗑️</button>
        </div>
    </div>

    <div class="cart-item">
        <span>Caramel Latte (Large, Iced) x2</span>

        <div class="actions">
            <span>36 SAR</span>
            <button class="edit-btn"><a href="Product_details.html">✏️</a></button>
            <button class="delete-btn">🗑️</button>
        </div>
    </div>

    <div class="total">
        Total: 54 SAR
    </div><br></br>   
    <button class="deleteall-btn"> Delete all 🗑️ </button>


</div>

<div class="cart-section">

    <h3 style="color:#63451a;">📍 Location</h3>

<div class="form-row">
    <label>Street</label>

 <select>
    <option selected>Al Shati</option>
    <option>Al Faisaliyah</option>
    <option>Al Muhammadiyah</option>
    <option>Al Rakah</option>
    <option>Al Aziziyah</option>
    <option>Al Mazruiyah</option>
    <option>Al Rawdah</option>
    <option>Al Qadisiyah</option>
    <option>Al Nada</option>
    <option>Al Khalidiyah</option>
    <option>Al Jamiyin</option>
    <option>Al Dawasir</option>
    <option>Al Jalawiyah</option>
    <option>Al Badiyah</option>
    <option>Al Anoud</option>
    <option>King Fahd Road</option>
    <option>Prince Mohammed Bin Fahd Road</option>
    <option>Corniche Road</option>
    <option>King Saud Street</option>
    <option>King Khalid Street</option>
</select>

    <span class="hint">Required</span>
</div>

    <div class="form-row">
        <label>Description</label>
        <input type="text" placeholder="Apartment, floor, etc.">
        <span class="hint">Optional</span>
    </div>

</div>

<div class="cart-section">

    <h3 style="color:#63451a;">💳 Payment</h3>

    <div class="form-row">
        <label>Card Name</label>
        <input type="text">
        <span class="hint">Full name</span>
    </div>

    <div class="form-row">
        <label>Card Number</label>
        <input type="text">
        <span class="hint">16 digits</span>
    </div>

    <div class="form-row">
        <label>Expiry</label>
        <input type="month">
        <span class="hint">MM/YYYY</span>
    </div>

    <div class="form-row">
        <label>CVV</label>
        <input type="text">
        <span class="hint">3 digits</span>
    </div>

</div>


<div class="cart-section">

    <button class="btn" onclick="window.location.href='home.html'">
        Buy Now
    </button>

</div>

</body>
</html>
