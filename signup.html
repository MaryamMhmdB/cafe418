<title>Sign Up</title>

<div class="gender">

  </label>

  <label class="gender-option">
    <input type="radio" name="gender"> Female
  </label>
</div>
    <button>Sign up</button>

    <p>Already have an account?</p>
    <a href="login.html">Sign in</a>
  </form>

</div>
